name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to upload assets to, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test package
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest hypothesis

      - name: Match test branch assumptions
        run: git config --global init.defaultBranch master

      - name: Run tests
        run: python -m pytest

  build:
    name: Build ${{ matrix.asset_name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_name: skill-repo-linux-x64
          - os: ubuntu-24.04-arm
            asset_name: skill-repo-linux-arm64
          - os: macos-15-intel
            asset_name: skill-repo-macos-x64
          - os: macos-15
            asset_name: skill-repo-macos-arm64
          - os: windows-2022
            asset_name: skill-repo-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . nuitka ordered-set zstandard

      - name: Build executable
        run: python scripts/build_binary.py --asset-name "${{ matrix.asset_name }}"

      - name: Verify executable
        shell: bash
        run: |
          binary="dist/${{ matrix.asset_name }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "$binary"
          fi
          "$binary" --version

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          gh release view "$TAG_NAME" >/dev/null
          gh release upload "$TAG_NAME" "dist/${{ matrix.asset_name }}" --clobber

  upload-installers:
    name: Upload installer scripts
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          gh release view "$TAG_NAME" >/dev/null
          gh release upload "$TAG_NAME" scripts/install-binary.sh scripts/install-binary.ps1 --clobber
